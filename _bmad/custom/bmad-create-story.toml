# Team override: обязательный GitNexus-анализ в bmad-create-story
# Коммитить в репозиторий — это командная политика.

[workflow]

activation_steps_append = [
  "GITNEXUS PRE-FLIGHT (обязательно перед шагами 2–4): Выполни `npx gitnexus status` через Bash и покажи результат. Если индекс устарел ('stale') или отсутствует — сообщи пользователю: 'Запусти `! npx gitnexus analyze` в терминале, затем перезапусти сессию'. Если индекс свежий — продолжай.",
]

persistent_facts = [
  "ПРАВИЛО АНАЛИЗА КОДА (обязательно): В шагах 2–4 ЗАПРЕЩЕНО запускать Explore-субагента (subagent_type=Explore) для исследования кодовой базы. Вместо этого использовать GitNexus MCP напрямую: gitnexus_query({query: '...'}) для поиска потоков выполнения, gitnexus_context({name: '...'}) для анализа символов. Читать файлы (Read) только для тех путей, которые вернул GitNexus. Это обязательное требование проекта FREESPORT.",
]
