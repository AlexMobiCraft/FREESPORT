name: Настройка правил защиты веток

on:
  # Запуск при создании репозитория
  create:
  # Запуск вручную
  workflow_dispatch:
  # Запуск при изменении workflow файлов
  push:
    paths:
      - ".github/workflows/setup-branch-protection.yml"
      - ".github/scripts/setup-branch-protection.sh"
    branches: [main, develop]

jobs:
  setup-branch-protection:
    name: Настройка правил защиты веток
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
      issues: write

    steps:
      - name: Checkout кода
        uses: actions/checkout@v4

      - name: Установка зависимостей
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Настройка правил защиты веток
        run: |
          chmod +x .github/scripts/setup-branch-protection.sh
          .github/scripts/setup-branch-protection.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Создание ISSUE для отслеживания
        if: github.event_name == 'create' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔧 Настройка правил защиты веток выполнена',
              body: `## 📋 Настройка правил защиты веток
              
              ### ✅ Выполненные действия:
              - [x] Настроены правила для ветки \`main\`
              - [x] Настроены правила для ветки \`develop\`
              - [x] Включены обязательные проверки CI/CD
              - [x] Требуется минимум 1 одобрение для PR
              - [x] Включена проверка на устаревшие коммиты
              
              ### 🔒 Текущие правила:
              - **main**: основная ветка для продакшена
              - **develop**: ветка для разработки и тестирования
              
              ### 📝 Рекомендации:
              1. Регулярно проверяйте актуальность требуемых проверок
              2. Рассмотрите возможность добавления дополнительных проверок
              3. Настройте уведомления об изменениях в защищенных ветках
              
              ---
              *Это issue создано автоматически при настройке репозитория*`,
              labels: ['infrastructure', 'branch-protection']
            })
