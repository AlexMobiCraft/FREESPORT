name: Sync Clean Version to Public Repo

on:
  push:
    branches:
      - main  # Срабатывает только при пуше в main ветку приватного репозитория

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Private Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove Internal and Heavy Files
        run: |
          echo "Starting cleanup of internal and sensitive files..."
          
          # 1. Удаление инструментов ИИ и логов работы
          rm -rf _bmad/ _bmad-output/ .claude/ .gemini/ .gemini-clipboard/ .agent/ .agents/ .agentvibes/ .windsurf/
          rm -rf .roomodes/ .web-bundles/ .kilocode/
          
          # 2. Удаление секретных файлов и локальных конфигов
          rm -f .env .env.prod .mcp.json FREESPORT.code-workspace project-context.md codebase.xml
          rm -f AGENTS.md GEMINI.md CLAUDE.md .kilocodemodes pytest.ini pyrightconfig.json 
          
          # 3. Удаление тяжелых данных и архивов 1С
          rm -rf data/import_1c/ data/import_1c.zip
          rm -f import_1c.tar.gz import_data_xml_only.zip
          
          # 4. Удаление временных файлов и логов
          rm -rf logs/ .pytest_cache/ .husky/ .pytype/ backend/Dockerfile.test backend/Dockerfile.prod mypy_output.txt 
          rm -rf  .roomodes/ .web-bundles/ .kilocode/ .agent/ .agents/ .agentvibes/ .windsurf/  
          
          # 5. Удаление тестовых и отладочных Docker-конфигураций (часто вызывают ложные срабатывания Secret Scanning)
          rm -f backend/Dockerfile.test backend/Dockerfile.dev frontend/Dockerfile.dev
          rm -f docker/docker-compose-temp.yml
          
          # 6. Удаление скриптов
          rm -rf scripts/

          # 7. Очистка документации от черновиков, внутренних логов и системных гайдов
          # Удаляем папки, которые не нужны в публичном портфолио
          rm -rf docs/archive/ docs/ci-cd/ docs/frontend/ docs/decisions/ docs/deploy/
          rm -rf docs/architecture/ai-implementation/
          rm -rf frontend/docs/
          
          # Удаляем специфические файлы
          rm -f docs/project-scan-report.json docs/technical-debt.md docs/testing-docker.md
          rm -f docs/development-guide.md docs/component-inventory-frontend.md
          rm -f docs/.wds-project-outline.yaml docs/Отчет_для_заказчика.md
          
          # 8. Удаление самих workflow файлов для публичного репозитория
          # Это решает проблему отсутствия прав 'workflow' у PAT и скрывает внутренние CI процессы
          rm -rf .github/workflows/ 

          # 9. Удаление файлов с конфиденциальной информацией
          rm -f .env .env.local .env.example .env.test
          
          # 10. Удаление файлов с отчетами
          rm -f Отчет.md
          
          echo "Cleanup finished."

      - name: Validate SYNC_TOKEN
        env:
          SYNC_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "❌ ОШИБКА: PUBLIC_REPO_TOKEN не установлен в GitHub Secrets!"
            echo "Для исправления:"
          echo "1. Создайте PAT с правами repo на github.com/AlexMobiCraft/FREESPORT-B2B"
          echo "2. Добавьте его как PUBLIC_REPO_TOKEN в Settings > Secrets and variables > Actions"
            exit 1
          fi
          echo "✅ SYNC_TOKEN присутствует"

      - name: Push to Public Repository
        env:
          # Используем кастомное имя переменной, чтобы избежать конфликта с системным GITHUB_TOKEN
          SYNC_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          PUBLIC_REPO_URL: "github.com/AlexMobiCraft/FREESPORT-B2B.git"
        run: |
          # Создаем временную директорию для формирования чистого коммита
          mkdir ../public_sync
          cp -ra . ../public_sync/
          cd ../public_sync
          
          # УДАЛЯЕМ ПАПКУ .git приватного репозитория, чтобы не переносить историю коммитов!
          # Это предотвратит срабатывание Secret Scanning на старые коммиты.
          rm -rf .git
          
          # Инициализируем абсолютно новый чистый репозиторий с веткой main
          git init -b main
          git config user.name "Freesport Sync Bot"
          git config user.email "bot@freesport.ru"
          
          git add .
          git commit -m "chore: public release $(date +'%Y-%m-%d %H:%M')"
          
          # Явно передаем токен в URL.
          git remote add public "https://x-access-token:${SYNC_TOKEN}@${PUBLIC_REPO_URL}"
          
          # Отключаем использование учетных данных от actions/checkout
          git config --local http.https://github.com/.extraheader ""
          
          # Пуш с обработкой ошибок
          if ! git push public main --force 2>&1; then
            echo "❌ ОШИБКА: Не удалось запушить в публичный репозиторий!"
            echo "Возможные причины:"
            echo "1. PUBLIC_REPO_TOKEN истёк — создайте новый PAT"
            echo "2. PAT не имеет прав на FREESPORT-B2B репозиторий"
            echo "3. PAT не имеет права 'Contents: read and write'"
            exit 1
          fi
          
          echo "Successfully synced to public repository!"
